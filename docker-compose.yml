services:
  db:
    image: postgres:${DATE_POSTGRESQL_VERSION}-alpine
    command: ["postgres", "-c", "max_connections=1000"]
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - /scripts/postgres-entrypoint.sh
    volumes:
      - date_postgres_data:/var/lib/postgresql/data/
      - ./scripts/postgres-entrypoint.sh:/scripts/postgres-entrypoint.sh:ro
    environment:
      POSTGRES_PASSWORD: ${DATE_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DATE_DB_PASSWORD}
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      MAX_CLIENT_CONN: 1000
      ADMIN_USERS: postgres,admin
  pgadmin:
    image: dpage/pgadmin4:latest
    profiles:
      - pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@example.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-password}
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - db
  web:
    env_file: .env
    build: .
    restart: unless-stopped
    #igSheduler startup command (nohup python /code/social/igupdate.py &) &&
    command: /bin/bash -c "./wait-for-postgres.sh db:5432 && ./wait-for-postgres.sh pgbouncer:5432 && python /code/manage.py migrate --noinput && python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/code
    ports:
      - ${DATE_DJANGO_PORT}:8000
    environment:
      DB_HOST: pgbouncer
    depends_on:
      - pgbouncer
      - db
      - redis
  celery:
    env_file: .env
    restart: unless-stopped
    build: .
    command: /bin/bash -c "./wait-for-postgres.sh db:5432 && ./wait-for-postgres.sh pgbouncer:5432 && celery -A core worker -l info -c 2"
    volumes:
      - .:/code
    environment:
      DB_HOST: pgbouncer
    depends_on:
      - web
      - pgbouncer
      - db
      - redis
  redis:
    restart: unless-stopped
    image: valkey/valkey:7.2-alpine
    volumes:
      - redis_data:/data

volumes:
  date_postgres_data:
  pgadmin_data:
  redis_data:
