services:
  db:
    image: postgres:${DATE_POSTGRESQL_VERSION}-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATE_DB_PASSWORD}
      POSTGRES_DB: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: valkey/valkey:7.2-alpine
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis_data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    command: >
      /bin/bash -c "bash wait-for-postgres.sh -t 60 db:5432 && python /code/manage.py migrate --noinput && python /code/manage.py runserver 0.0.0.0:8000"
    environment:
      SECRET_KEY: ${DATE_SECRET_KEY}
      DEBUG: ${DATE_DEBUG}
      DEVELOP: ${DATE_DEVELOP}
      PROJECT_NAME: ${PROJECT_NAME}
      FRONTEND_DEFAULT_ROUTE: ${FRONTEND_DEFAULT_ROUTE}
      LEGACY_TEMPLATE_ROUTES_ENABLED: ${LEGACY_TEMPLATE_ROUTES_ENABLED}
      DB_USERNAME: postgres
      DB_PASSWORD: ${DATE_DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      USE_S3: ${USE_S3}
      AWS_S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
      AWS_STORAGE_BUCKET_NAME: ${S3_BUCKET_NAME}
      PUBLIC_MEDIA_LOCATION: ${PUBLIC_MEDIA_LOCATION}
      PRIVATE_MEDIA_LOCATION: ${PRIVATE_MEDIA_LOCATION}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      EXTRA_STAFF_GROUPS: ${EXTRA_STAFF_GROUPS}
      EMAIL_HOST_RECEIVER: ${EMAIL_HOST_RECEIVER}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      CF_TURNSTILE_SITE_KEY: ${CF_TURNSTILE_SITE_KEY}
      CF_TURNSTILE_SECRET_KEY: ${CF_TURNSTILE_SECRET_KEY}
      ALUMNI_SETTINGS: ${ALUMNI_SETTINGS}
      ASSOCIATION_THEME: ${ASSOCIATION_THEME}
      DATE_DEMO_ADMIN_USERNAME: ${DATE_DEMO_ADMIN_USERNAME}
      DATE_DEMO_ADMIN_PASSWORD: ${DATE_DEMO_ADMIN_PASSWORD}
      DATE_DEMO_MEMBER_PASSWORD: ${DATE_DEMO_MEMBER_PASSWORD}
      REDIS_SERVER: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://127.0.0.1:8000/api/v1/meta/site > /dev/null || exit 1" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - ./backend:/code
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  asgi:
    build:
      context: ./backend
    restart: unless-stopped
    command: >
      /bin/bash -c "bash wait-for-postgres.sh -t 60 db:5432 && daphne -b 0.0.0.0 -p 8001 core.routing:application"
    environment:
      SECRET_KEY: ${DATE_SECRET_KEY}
      DEBUG: ${DATE_DEBUG}
      DEVELOP: ${DATE_DEVELOP}
      PROJECT_NAME: ${PROJECT_NAME}
      FRONTEND_DEFAULT_ROUTE: ${FRONTEND_DEFAULT_ROUTE}
      LEGACY_TEMPLATE_ROUTES_ENABLED: ${LEGACY_TEMPLATE_ROUTES_ENABLED}
      DB_USERNAME: postgres
      DB_PASSWORD: ${DATE_DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      REDIS_SERVER: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/code
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  celery:
    build:
      context: ./backend
    restart: unless-stopped
    command: celery -A core worker -l info -c 2
    environment:
      SECRET_KEY: ${DATE_SECRET_KEY}
      DEBUG: ${DATE_DEBUG}
      DEVELOP: ${DATE_DEVELOP}
      PROJECT_NAME: ${PROJECT_NAME}
      DB_USERNAME: postgres
      DB_PASSWORD: ${DATE_DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      ALUMNI_SETTINGS: ${ALUMNI_SETTINGS}
      REDIS_SERVER: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/code
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    command: npm run dev -- --webpack --hostname 0.0.0.0 --port 3000
    environment:
      NEXT_PUBLIC_APP_ORIGIN: ${NEXT_PUBLIC_APP_ORIGIN}
      BACKEND_API_ORIGIN: ${BACKEND_API_ORIGIN}
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/healthz > /dev/null || exit 1" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 45s
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  e2e:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    restart: "no"
    working_dir: /work/frontend
    command: sleep infinity
    ipc: host
    init: true
    environment:
      CI: "1"
    volumes:
      - ./frontend:/work/frontend
      - e2e_node_modules:/work/frontend/node_modules
    depends_on:
      proxy:
        condition: service_started
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  proxy:
    image: nginx:1.27.4-alpine
    restart: unless-stopped
    ports:
      - ${APP_PORT}:80
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
      asgi:
        condition: service_started
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz > /dev/null || exit 1" ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ./infra/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules:
  e2e_node_modules:
