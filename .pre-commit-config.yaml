repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.13
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  # djlint is intentionally excluded from pre-commit: it deadlocks under
  # Python 3.14 when pre-commit batches files across threads. Run via CI
  # instead (the `lint` job in web_startup.yaml).
