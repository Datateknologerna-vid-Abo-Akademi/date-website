global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: host
    static_configs:
      - targets:
          - node-exporter:9100

  - job_name: exporters
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/*.yml
