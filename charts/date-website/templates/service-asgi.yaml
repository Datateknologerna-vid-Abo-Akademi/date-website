apiVersion: v1
kind: Service
metadata:
  name: {{ include "date-website.fullname" . }}-asgi
  labels:
    {{- include "date-website.labels" . | nindent 4 }}
    app.kubernetes.io/component: asgi
spec:
  type: {{ .Values.asgi.service.type }}
  ports:
    - port: {{ .Values.asgi.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "date-website.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: asgi
