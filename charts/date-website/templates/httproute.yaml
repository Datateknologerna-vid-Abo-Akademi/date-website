{{- if .Values.gateway.enabled -}}
{{- $gatewayName := default (include "date-website.fullname" .) .Values.gateway.name -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "date-website.fullname" . }}
  labels:
    {{- include "date-website.labels" . | nindent 4 }}
  {{- with .Values.gateway.route.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ $gatewayName }}
  hostnames:
    {{- range .Values.ingress.hosts }}
    - {{ .host | quote }}
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.asgi.wsPath | quote }}
      backendRefs:
        - name: {{ include "date-website.fullname" . }}-asgi
          port: {{ .Values.asgi.service.port }}
    {{- range .Values.ingress.hosts }}
    {{- range .paths }}
    - matches:
        - path:
            type: {{ ternary "Exact" "PathPrefix" (eq .pathType "Exact") }}
            value: {{ .path | quote }}
      backendRefs:
        - name: {{ include "date-website.fullname" $ }}-web
          port: {{ $.Values.web.service.port }}
    {{- end }}
    {{- end }}
{{- end }}
