apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "date-website.fullname" . }}-web
  labels:
    {{- include "date-website.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      {{- include "date-website.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        {{- include "date-website.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: web
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "date-website.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
          args:
            - |
              set -e
              ./wait-for-postgres.sh "${DB_HOST}:${DB_PORT}"
              {{- if .Values.web.migrateOnStartup }}
              python /code/manage.py migrate --noinput
              {{- end }}
              {{- if .Values.web.collectstaticOnStartup }}
              python /code/manage.py collectstatic --noinput
              {{- end }}
              exec gunicorn \
                -w {{ .Values.web.gunicorn.workers }} \
                --max-requests {{ .Values.web.gunicorn.maxRequests }} \
                --max-requests-jitter {{ .Values.web.gunicorn.maxRequestsJitter }} \
                --bind=0.0.0.0:8000 \
                core.wsgi
          envFrom:
            - configMapRef:
                name: {{ include "date-website.fullname" . }}
            - secretRef:
                name: {{ include "date-website.secretName" . }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz/
              port: http
              httpHeaders:
                - name: Host
                  value: {{ first .Values.django.allowedHosts | quote }}
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz/
              port: http
              httpHeaders:
                - name: Host
                  value: {{ first .Values.django.allowedHosts | quote }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.web.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- include "date-website.mediaVolumeMount" . | nindent 10 }}
      {{- include "date-website.mediaVolume" . | nindent 6 }}
