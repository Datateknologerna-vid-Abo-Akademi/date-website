apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "date-website.fullname" . }}-asgi
  labels:
    {{- include "date-website.labels" . | nindent 4 }}
    app.kubernetes.io/component: asgi
spec:
  replicas: {{ .Values.asgi.replicaCount }}
  selector:
    matchLabels:
      {{- include "date-website.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: asgi
  template:
    metadata:
      labels:
        {{- include "date-website.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: asgi
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "date-website.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: asgi
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/bash
            - -c
          args:
            - |
              set -e
              ./wait-for-postgres.sh "${DB_HOST}:${DB_PORT}"
              exec daphne -b 0.0.0.0 -p 8000 core.routing:application
          envFrom:
            - configMapRef:
                name: {{ include "date-website.fullname" . }}
            - secretRef:
                name: {{ include "date-website.secretName" . }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz/
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /readyz/
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.asgi.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- include "date-website.mediaVolumeMount" . | nindent 10 }}
      {{- include "date-website.mediaVolume" . | nindent 6 }}
