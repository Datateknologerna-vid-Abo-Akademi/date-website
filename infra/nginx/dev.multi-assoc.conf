upstream frontend_upstream {
    server frontend:3000;
}

upstream backend_date_upstream {
    server backend_date:8000;
}

upstream backend_kk_upstream {
    server backend_kk:8000;
}

upstream backend_biocum_upstream {
    server backend_biocum:8000;
}

upstream backend_on_upstream {
    server backend_on:8000;
}

upstream backend_demo_upstream {
    server backend_demo:8000;
}

upstream asgi_upstream {
    server asgi:8001;
}

map $http_x_forwarded_host $effective_host_raw {
    default $host;
    "~.+" $http_x_forwarded_host;
}

map $effective_host_raw $effective_host {
    default $effective_host_raw;
    "~^(?<host_no_port>[^:]+)" $host_no_port;
}

map $effective_host $backend_target {
    default backend_date_upstream;
    date.lvh.me backend_date_upstream;
    kk.lvh.me backend_kk_upstream;
    biocum.lvh.me backend_biocum_upstream;
    on.lvh.me backend_on_upstream;
    demo.lvh.me backend_demo_upstream;
}

server {
    listen 80;
    server_name _;

    location = /healthz {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /ws/ {
        proxy_pass http://asgi_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://$backend_target;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://$backend_target;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin {
        return 301 $scheme://$http_host/admin/;
    }

    location /media/ {
        proxy_pass http://$backend_target;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://$backend_target;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Original-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
