{% load static i18n localized_urls %}
<aside class="logo-container partner-sidebar"
       aria-labelledby="partner-heading">
  <h3 id="partner-heading" class="header-border-bottom">{% trans "Samarbetspartners" %}</h3>
  <div class="partner-logos">
    {% for ad in ads %}
      {% if ad.company_url %}
        <a class="partner-logo" href="{{ ad.company_url }}">
          <img src="{{ ad.ad_url }}"
               alt="{% trans 'Partner logo' %}"
               loading="lazy"
               decoding="async"
               onerror="this.onerror=null;this.src='{% static 'core/images/fallback.png' %}'">
        </a>
      {% else %}
        <span class="partner-logo">
          <img src="{{ ad.ad_url }}"
               alt="{% trans 'Partner logo' %}"
               loading="lazy"
               decoding="async"
               onerror="this.onerror=null;this.src='{% static 'core/images/fallback.png' %}'">
        </span>
      {% endif %}
    {% endfor %}
  </div>
  <a class="partner-cta"
     href="{{ '/pages/foretagssamarbete/'|localized_url }}">{% trans "Vill du samarbeta med SF-klubben?" %}</a>
</aside>
