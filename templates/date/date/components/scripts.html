<script id="custom" defer>
    // element with id "calendar_json" is populated by django as defined in views.py context object
    const calendarScript = document.querySelector('script#calendar_json');
    const events_json = calendarScript ? JSON.parse(calendarScript.textContent) : {};

    const isValidInternalUrl = (url) => {
        if (typeof url !== 'string' || !url) return false;
        const trimmedUrl = url.trim();
        if (trimmedUrl.startsWith('//')) return false;

        const lowerUrl = trimmedUrl.toLowerCase();
        if (lowerUrl.startsWith('javascript:') || lowerUrl.startsWith('data:') || lowerUrl.startsWith('vbscript:')) {
            return false;
        }

        if (trimmedUrl.startsWith('/') && !trimmedUrl.startsWith('//')) {
            return true;
        }

        try {
            const urlObj = new URL(trimmedUrl, window.location.origin);
            return urlObj.origin === window.location.origin;
        } catch (e) {
            return false;
        }
    };

    Object.entries(events_json).forEach((o)=>{
        const tempDate = new Date(o[1].eventFullDate);
        let hours = tempDate.getHours();
        let minutes = tempDate.getMinutes();
        // Ensure hours and minutes are displayed with two digits
        hours = hours < 10 ? '0' + hours : hours;
        minutes = minutes < 10 ? '0' + minutes : minutes;
        const rawUrl = (o[1].link || '').trim();
        
        const link = document.createElement('a');
        link.className = "calendar-eventday-popup";
        link.id = "calendar_link";
        
        if (isValidInternalUrl(rawUrl)) {
            try {
                const urlObj = new URL(rawUrl, window.location.origin);
                if (urlObj.origin === window.location.origin) {
                    link.href = urlObj.href;
                } else {
                    link.href = '#';
                }
            } catch (e) {
                link.href = '#';
            }
        } else {
            link.href = '#';
        }

        const timeText = document.createTextNode(`${hours}:${minutes}`);
        const br = document.createElement('br');
        const titleText = document.createTextNode(o[1].eventTitle);
        
        link.appendChild(timeText);
        link.appendChild(br);
        link.appendChild(titleText);

        o[1].html = link.outerHTML;
    });

    // Select all elements with class 'calendar' and initialize VanillaCalendar on each
    document.querySelectorAll('.calendar').forEach(calendarElement => {
        const calendarPopups = new VanillaCalendar(calendarElement, {
            actions: {
                clickDay(event, date) {
                    if(events_json[date[0]] !== undefined) {
                        const rawUrl = (events_json[date[0]].link || '').trim();
                        if (isValidInternalUrl(rawUrl)) {
                            try {
                                const safeUrl = new URL(rawUrl, window.location.origin);
                                if (safeUrl.origin === window.location.origin) {
                                    window.location.href = safeUrl.href;
                                }
                            } catch (e) {
                                // Fallback or silent fail
                            }
                        }
                    }
                },
            },
            settings: {
                visibility: {
                    weekend: false,
                },
                selected: {
                    month: new Date().getMonth(),
                    year: new Date().getFullYear(),
                },
            },
            popups: events_json
        });
        calendarPopups.init();
    });
</script>
<script>
    async function getJoke() {
        return await fetch("https://icanhazdadjoke.com", {
                headers: {
                    "Accept": "application/json"
                }
            })
            .then(response => response.json())
            .then(function(data) {
                return data ? data.joke : ""
            })
            .catch(function(e) {
                document.querySelectorAll("#joke-header")
                    .forEach(function(elem) {
                        elem.innerText = "";
                    });
                return ""
            }) ||
            "";
    }
    getJoke().then((joke) => {
        document.querySelectorAll("#joke-string").forEach(function(elem) {
            elem.innerText = joke;
        })
    })
</script>
