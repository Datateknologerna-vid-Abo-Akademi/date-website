{% load i18n %}

<div class="two-factor-actions">
    {% if wizard.steps.prev %}
        <button name="wizard_goto_step" type="submit" value="{{ wizard.steps.prev }}" class="two-factor-secondary">
            {% trans "Back" %}
        </button>
    {% endif %}
    <button type="submit">
        {% trans "Continue" %}
    </button>
</div>
