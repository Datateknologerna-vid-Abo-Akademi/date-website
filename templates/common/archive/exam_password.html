{% extends 'core/base.html' %}
{% load static %}
{% load i18n %}
{% block title %}{% trans 'Tentarkiv' %}{% endblock %}

{% block extra_head %}
    {{ block.super }}
    <link rel="stylesheet" href="{% static 'archive/css/document.css' %}" type="text/css">
{% endblock %}

{% block content %}
    <div class="container-md min-vh-100 container-margin-top p-1">
        <div class="container-size" style="max-width: 500px;">
            <div class="content">
                <div class="hero-text-box" style="text-align:center;">
                    <h1>{% trans "Tentarkiv" %} <i class="fas fa-book-dead"></i></h1>
                </div>
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit">{% trans "Fortsätt" %}</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
