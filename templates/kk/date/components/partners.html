<div class="logo-container">
  {% load static i18n %}
  <h3 id="partner-heading" class="mt-3">{% trans "Samarbetspartners" %}</h3>
  <div class="carousel-logos">
    <ul>
      {% for ad in ads %}
        <li class="company-logo text-center">
          {% if ad.company_url %}
            <a href="{{ ad.company_url }}">
              <img src="{{ ad.ad_url }}"
                   alt="{% trans 'Partner logo' %}"
                   loading="lazy"
                   decoding="async"
                   onerror="this.onerror=null;this.src='{% static 'core/images/fallback.png' %}'">
            </a>
          {% else %}
            <span>
              <img src="{{ ad.ad_url }}"
                   alt="{% trans 'Partner logo' %}"
                   loading="lazy"
                   decoding="async"
                   onerror="this.onerror=null;this.src='{% static 'core/images/fallback.png' %}'">
            </span>
          {% endif %}
        </li>
      {% endfor %}
    </ul>
  </div>
</div>
