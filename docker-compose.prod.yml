services:
  db:
    image: postgres:${DATE_POSTGRESQL_VERSION}-alpine
    restart: always
    entrypoint:
      - /bin/sh
      - /scripts/postgres-entrypoint.sh
    volumes:
      - date_postgres_data:/var/lib/postgresql/data/
      - ./scripts/postgres-entrypoint.sh:/scripts/postgres-entrypoint.sh:ro
    environment:
      POSTGRES_PASSWORD: ${DATE_DB_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    networks:
      - internal
  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: ${DATE_DB_PASSWORD}
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      MAX_CLIENT_CONN: 1000
      ADMIN_USERS: postgres,admin
    networks:
      - internal
  web:
    env_file: .env
    image: ghcr.io/datateknologerna-vid-abo-akademi/date-website:${DATE_IMG_TAG}
    restart: always
    command: /bin/bash -c "./wait-for-postgres.sh db:5432 && ./wait-for-postgres.sh pgbouncer:5432 && python /code/manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn -w 3 --max-requests 1000 --max-requests-jitter 100 --bind=0.0.0.0 core.wsgi"
    environment:
      DB_HOST: pgbouncer
    depends_on:
      - pgbouncer
      - db
      - redis
    networks:
      - internal
  asgi:
    env_file: .env
    image: ghcr.io/datateknologerna-vid-abo-akademi/date-website:${DATE_IMG_TAG}
    restart: always
    command: /bin/bash -c "./wait-for-postgres.sh db:5432 && ./wait-for-postgres.sh pgbouncer:5432 && daphne -b 0.0.0.0 core.routing:application"
    environment:
      DB_HOST: pgbouncer
    depends_on:
      - pgbouncer
      - db
      - redis
    networks:
      - internal
  celery:
    env_file: .env
    restart: always
    image: ghcr.io/datateknologerna-vid-abo-akademi/date-website:${DATE_IMG_TAG}
    command: /bin/bash -c "./wait-for-postgres.sh db:5432 && ./wait-for-postgres.sh pgbouncer:5432 && celery -A core worker -l info -c 2"
    environment:
      DB_HOST: pgbouncer
    depends_on:
      - pgbouncer
      - db
      - redis
    networks:
        - internal
  redis:
    restart: always
    image: valkey/valkey:7.2-alpine
    networks:
      - internal
    volumes:
      - redis_data:/data
  nginx:
    restart: always
    image: nginx:stable-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    networks:
      - internal
      - web
    depends_on:
      - web
      - asgi

volumes:
  date_postgres_data:
  redis_data:

networks:
    internal:
    web:
      external: true
