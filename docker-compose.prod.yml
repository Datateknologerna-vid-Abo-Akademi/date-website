services:
  db:
    image: postgres:${DATE_POSTGRESQL_VERSION}-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATE_DB_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: valkey/valkey:7.2-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    image: ${BACKEND_IMAGE:-datewebsite-backend:latest}
    build:
      context: ./backend
    restart: unless-stopped
    command: >
      /bin/bash -c "./wait-for-postgres.sh db:5432 &&
      python /code/manage.py migrate --noinput &&
      python /code/manage.py collectstatic --noinput &&
      gunicorn -w 3 --max-requests 1000 --max-requests-jitter 100 --bind=0.0.0.0:8000 core.wsgi"
    environment:
      SECRET_KEY: ${DATE_SECRET_KEY}
      DEBUG: False
      DEVELOP: False
      PROJECT_NAME: ${PROJECT_NAME}
      FRONTEND_DEFAULT_ROUTE: ${FRONTEND_DEFAULT_ROUTE}
      LEGACY_TEMPLATE_ROUTES_ENABLED: ${LEGACY_TEMPLATE_ROUTES_ENABLED:-False}
      DB_USERNAME: postgres
      DB_PASSWORD: ${DATE_DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      TRUST_X_FORWARDED_HOST: ${TRUST_X_FORWARDED_HOST:-True}
      ALLOW_DIRECT_HOST_TENANT_FALLBACK: ${ALLOW_DIRECT_HOST_TENANT_FALLBACK:-False}
      TENANT_HOST_MAP: ${TENANT_HOST_MAP:-{}}
      TENANT_DEFAULT_LOCALES: ${TENANT_DEFAULT_LOCALES:-{}}
      EXTRA_STAFF_GROUPS: ${EXTRA_STAFF_GROUPS}
      EMAIL_HOST_RECEIVER: ${EMAIL_HOST_RECEIVER}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      CF_TURNSTILE_SITE_KEY: ${CF_TURNSTILE_SITE_KEY}
      CF_TURNSTILE_SECRET_KEY: ${CF_TURNSTILE_SECRET_KEY}
      ALUMNI_SETTINGS: ${ALUMNI_SETTINGS}
      ASSOCIATION_THEME: ${ASSOCIATION_THEME}
      REDIS_SERVER: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  asgi:
    image: ${BACKEND_IMAGE:-datewebsite-backend:latest}
    build:
      context: ./backend
    restart: unless-stopped
    command: >
      /bin/bash -c "./wait-for-postgres.sh db:5432 &&
      daphne -b 0.0.0.0 -p 8001 core.routing:application"
    environment:
      SECRET_KEY: ${DATE_SECRET_KEY}
      DEBUG: False
      DEVELOP: False
      PROJECT_NAME: ${PROJECT_NAME}
      FRONTEND_DEFAULT_ROUTE: ${FRONTEND_DEFAULT_ROUTE}
      LEGACY_TEMPLATE_ROUTES_ENABLED: ${LEGACY_TEMPLATE_ROUTES_ENABLED:-False}
      DB_USERNAME: postgres
      DB_PASSWORD: ${DATE_DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      ALLOWED_HOSTS: ${ALLOWED_HOSTS}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      TRUST_X_FORWARDED_HOST: ${TRUST_X_FORWARDED_HOST:-True}
      ALLOW_DIRECT_HOST_TENANT_FALLBACK: ${ALLOW_DIRECT_HOST_TENANT_FALLBACK:-False}
      TENANT_HOST_MAP: ${TENANT_HOST_MAP:-{}}
      TENANT_DEFAULT_LOCALES: ${TENANT_DEFAULT_LOCALES:-{}}
      REDIS_SERVER: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    image: ${BACKEND_IMAGE:-datewebsite-backend:latest}
    build:
      context: ./backend
    restart: unless-stopped
    command: celery -A core worker -l info -c 2
    environment:
      SECRET_KEY: ${DATE_SECRET_KEY}
      DEBUG: False
      DEVELOP: False
      PROJECT_NAME: ${PROJECT_NAME}
      DB_USERNAME: postgres
      DB_PASSWORD: ${DATE_DB_PASSWORD}
      DB_HOST: db
      DB_PORT: 5432
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
      ALUMNI_SETTINGS: ${ALUMNI_SETTINGS}
      REDIS_SERVER: redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    image: ${FRONTEND_IMAGE:-datewebsite-frontend:latest}
    build:
      context: ./frontend
      target: runtime
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_APP_ORIGIN: ${NEXT_PUBLIC_APP_ORIGIN}
      BACKEND_API_ORIGIN: ${BACKEND_API_ORIGIN}
      NEXT_PUBLIC_TENANT_HOST_MAP: ${TENANT_HOST_MAP:-{}}
      NEXT_PUBLIC_TENANT_DEFAULT_LOCALES: ${TENANT_DEFAULT_LOCALES:-{}}
      NEXT_PUBLIC_DEFAULT_TENANT: ${PROJECT_NAME}
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      backend:
        condition: service_started

  proxy:
    image: nginx:1.27.4-alpine
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
      asgi:
        condition: service_started
    ports:
      - ${APP_PORT}:80
    volumes:
      - ./infra/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  redis_data:
