# Runs all associations simultaneously for style comparison.
# Each association gets its own web container on a dedicated port, all sharing
# the same Postgres database and Redis instance.
#
# Usage:
#   docker compose -f docker-compose.dev-all.yml up --build
#
# Association ports:
#   biocum   → http://localhost:8001
#   date     → http://localhost:8002
#   kk       → http://localhost:8003
#   pulterit → http://localhost:8004

x-web-common: &web-common
  build: .
  restart: unless-stopped
  volumes:
    - .:/code
  command: /bin/bash -c "./wait-for-postgres.sh db:5432 && python manage.py runserver 0.0.0.0:8000"
  depends_on:
    init:
      condition: service_completed_successfully
    redis:
      condition: service_started

x-web-env: &web-env
  SECRET_KEY: ${DATE_SECRET_KEY}
  DEBUG: "True"
  DEVELOP: "True"
  DB_PASSWORD: ${DATE_DB_PASSWORD}
  USE_S3: ${USE_S3}
  AWS_S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
  AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY}
  AWS_SECRET_ACCESS_KEY: ${S3_SECRET_KEY}
  AWS_STORAGE_BUCKET_NAME: ${S3_BUCKET_NAME}
  AWS_PRIVATE_STORAGE_BUCKET_NAME: ${S3_PRIVATE_BUCKET_NAME:-}
  AWS_PUBLIC_STORAGE_BUCKET_NAME: ${S3_PUBLIC_BUCKET_NAME:-}
  AWS_S3_REGION_NAME: ${S3_REGION_NAME:-}
  AWS_S3_SIGNATURE_VERSION: ${S3_SIGNATURE_VERSION:-}
  AWS_S3_ADDRESSING_STYLE: ${S3_ADDRESSING_STYLE:-}
  PUBLIC_MEDIA_LOCATION: ${PUBLIC_MEDIA_LOCATION}
  PRIVATE_MEDIA_LOCATION: ${PRIVATE_MEDIA_LOCATION}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
  EXTRA_STAFF_GROUPS: ${EXTRA_STAFF_GROUPS}
  EMAIL_HOST_RECEIVER: ${EMAIL_HOST_RECEIVER}
  DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL}
  EMAIL_HOST: ${EMAIL_HOST}
  EMAIL_HOST_USER: ${EMAIL_HOST_USER}
  EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
  CF_TURNSTILE_SITE_KEY: ${CF_TURNSTILE_SITE_KEY}
  CF_TURNSTILE_SECRET_KEY: ${CF_TURNSTILE_SECRET_KEY}
  ALUMNI_SETTINGS: ${ALUMNI_SETTINGS}
  ENABLE_LANGUAGE_FEATURES: ${ENABLE_LANGUAGE_FEATURES}
  GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
  GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
  GITHUB_MFA_POLICY: ${GITHUB_MFA_POLICY:-enrolled}

services:
  db:
    image: postgres:${DATE_POSTGRESQL_VERSION}-alpine
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - /scripts/postgres-entrypoint.sh
    volumes:
      - dev_all_postgres_data:/var/lib/postgresql/data/
      - ./scripts/postgres-entrypoint.sh:/scripts/postgres-entrypoint.sh:ro
    environment:
      - POSTGRES_PASSWORD=${DATE_DB_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"

  redis:
    image: valkey/valkey:7.2-alpine
    restart: unless-stopped
    volumes:
      - dev_all_redis_data:/data

  # Runs once: migrate + collectstatic + compilemessages (using 'date' as the
  # representative project). All web containers wait for this to finish before
  # starting, so they only need to serve requests.
  init:
    build: .
    restart: "no"
    command: /bin/bash -c "./wait-for-postgres.sh db:5432 && python manage.py migrate --noinput && python manage.py collectstatic --noinput && python manage.py compilemessages -l en -l fi -l sv --verbosity 0"
    volumes:
      - .:/code
    environment:
      <<: *web-env
      PROJECT_NAME: date
    depends_on:
      - db

  # Named 'web' so clean_init.sh can run fixtures against it.
  # Uses PROJECT_NAME=date because it's the only association with the ctf app.
  web:
    <<: *web-common
    ports:
      - "8002:8000"
    environment:
      <<: *web-env
      PROJECT_NAME: date

  web-biocum:
    <<: *web-common
    ports:
      - "8001:8000"
    environment:
      <<: *web-env
      PROJECT_NAME: biocum

  # web-date is covered by the 'web' service above (port 8002).

  web-kk:
    <<: *web-common
    ports:
      - "8003:8000"
    environment:
      <<: *web-env
      PROJECT_NAME: kk

  web-pulterit:
    <<: *web-common
    ports:
      - "8004:8000"
    environment:
      <<: *web-env
      PROJECT_NAME: pulterit

volumes:
  dev_all_postgres_data:
  dev_all_redis_data:
