name: Apply Branch Protection

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to protect (for example: main)"
        required: true
        default: "main"
      enforce_admins:
        description: "Enforce branch protection for admins"
        type: boolean
        required: true
        default: true

permissions:
  contents: read

jobs:
  apply-protection:
    name: Apply protection rules
    runs-on: ubuntu-latest
    steps:
      - name: Validate admin token is configured
        env:
          GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
        run: |
          if [ -z "${GH_ADMIN_TOKEN}" ]; then
            echo "Missing GH_ADMIN_TOKEN secret. Configure a repo admin PAT first."
            exit 1
          fi

      - name: Apply protection via GitHub REST API
        env:
          GH_ADMIN_TOKEN: ${{ secrets.GH_ADMIN_TOKEN }}
          OWNER_REPO: ${{ github.repository }}
          TARGET_BRANCH: ${{ inputs.branch }}
          ENFORCE_ADMINS: ${{ inputs.enforce_admins }}
        run: |
          set -euo pipefail
          payload="$(jq -n \
            --argjson enforce_admins "${ENFORCE_ADMINS}" \
            '{
              required_status_checks: {
                strict: true,
                checks: [
                  { context: "Frontend Lint and Build" },
                  { context: "Backend Checks" },
                  { context: "Playwright Smoke (Docker Stack)" }
                ]
              },
              enforce_admins: $enforce_admins,
              required_pull_request_reviews: {
                dismiss_stale_reviews: true,
                require_code_owner_reviews: false,
                required_approving_review_count: 1
              },
              restrictions: null,
              required_linear_history: true,
              allow_force_pushes: false,
              allow_deletions: false,
              block_creations: false,
              required_conversation_resolution: true,
              lock_branch: false,
              allow_fork_syncing: false
            }')"

          curl -sS -X PUT \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_ADMIN_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${OWNER_REPO}/branches/${TARGET_BRANCH}/protection" \
            -d "${payload}" > response.json

          cat response.json
