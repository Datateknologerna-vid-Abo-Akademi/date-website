name: Association QA

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

concurrency:
  group: qa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  qa:
    name: Multi-Association Runtime QA
    runs-on: ubuntu-latest
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run association QA
        run: python scripts/association_qa.py

      - name: Upload QA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: association-qa-report
          path: docs/association-qa-report.md
          retention-days: 14
