name: Build and publish Docker image

on:
  push:
    branches:
      - develop
      - master
    tags:
      - 'v*.*.*'
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'

permissions:
  contents: read
  packages: write
jobs:
  build:
    concurrency:
      group: 'docker-publish-${{ github.ref_name }}'
      cancel-in-progress: true
    runs-on: ubuntu-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Compute image repository
        id: image
        run: |
          echo "repo_lower=${GITHUB_REPOSITORY,,}" >> "${GITHUB_OUTPUT}"
      - name: Docker login with retry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin; then
              exit 0
            fi
            if [ "${attempt}" -lt 3 ]; then
              sleep $((attempt * 5))
            fi
          done
          echo "GHCR login failed after 3 attempts."
          exit 1
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ steps.image.outputs.repo_lower }}:${{ github.ref_name }}
            ghcr.io/${{ steps.image.outputs.repo_lower }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
