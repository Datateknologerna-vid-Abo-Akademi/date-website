name: Frontend Smoke E2E

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: smoke-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: Playwright Smoke (Docker Stack)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests for date and on associations
        run: |
          set -euo pipefail
          for association in date on; do
            echo "=== Running frontend smoke suite for association: ${association} ==="
            PROJECT_NAME="${association}" docker compose -f docker-compose.yml --env-file .env.example up -d --build db redis backend asgi frontend proxy
            timeout 180 bash -c 'until curl -fsS http://localhost:8080/api/v1/meta/site > /dev/null; do sleep 3; done'
            docker compose -f docker-compose.yml --env-file .env.example exec -T backend python /code/manage.py shell -c "from scripts.seed_smoke_data import seed_smoke_data; print(seed_smoke_data())"
            (
              cd frontend
              PLAYWRIGHT_BASE_URL=http://localhost:8080 \
              PLAYWRIGHT_SMOKE_USERNAME=ci_smoke \
              PLAYWRIGHT_SMOKE_PASSWORD=ci_smoke_password \
              PLAYWRIGHT_SMOKE_EVENT_SLUG=ci-smoke-event \
              PLAYWRIGHT_EXPECT_PROJECT_NAME="${association}" \
              npm run test:e2e
            )
            docker compose -f docker-compose.yml --env-file .env.example down
          done

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-test-results
          path: frontend/test-results/
          retention-days: 14

      - name: Dump docker compose logs
        if: failure()
        run: docker compose -f docker-compose.yml --env-file .env.example logs --tail=200

      - name: Shutdown docker stack
        if: always()
        run: docker compose -f docker-compose.yml --env-file .env.example down
