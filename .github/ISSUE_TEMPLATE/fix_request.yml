name: Maintenance or small fix
description: Request a small correction, cleanup, dependency update, or technical improvement.
title: "chore: "
labels: ["chore"]
body:
  - type: markdown
    attributes:
      value: |
        Use this when the current behavior mostly works, but something should be cleaned up, clarified, modernized, or made less fragile.
  - type: dropdown
    id: kind
    attributes:
      label: Change type
      options:
        - Code cleanup
        - UI polish
        - Copy or content correction
        - Documentation correction
        - Dependency or tooling update
        - Test coverage
        - Performance
        - Accessibility
        - Other
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current state
      description: What exists now, and why is it worth improving?
    validations:
      required: true
  - type: textarea
    id: desired
    attributes:
      label: Desired state
      description: Describe the exact correction or cleanup you want.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope boundaries
      description: Note files, apps, pages, or behavior that should be included or left untouched.
      placeholder: |
        In scope:
        Out of scope:
    validations:
      required: false
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: How should someone confirm this fix is complete?
      placeholder: |
        - Run ...
        - Visit ...
        - Confirm ...
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: This is not a reproducible bug report or a larger feature request.
          required: true
        - label: I searched existing issues and did not find a duplicate.
          required: true
