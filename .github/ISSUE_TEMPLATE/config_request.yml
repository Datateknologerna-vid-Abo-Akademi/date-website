name: Configuration request
description: Request environment, deployment, secret, domain, storage, or service configuration work.
title: "config: "
labels: ["configuration"]
body:
  - type: markdown
    attributes:
      value: |
        Do not paste real secrets, passwords, app keys, tokens, private bucket names, or production data into this issue.
  - type: dropdown
    id: target
    attributes:
      label: Target environment
      options:
        - Local development
        - Review app or staging
        - Production Docker Compose
        - Production Kubernetes/Helm
        - CI/CD
        - Documentation/example configuration
        - Other
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Configuration category
      options:
        - Environment variable
        - Secret or credential rotation
        - Database or Valkey/Redis
        - S3-compatible storage
        - Domain, TLS, or ingress
        - Docker Compose
        - Kubernetes or Helm
        - GitHub Actions
        - Language or association setting
        - Other
    validations:
      required: true
  - type: textarea
    id: request
    attributes:
      label: What needs to be configured?
      description: Describe the requested change without including secret values.
      placeholder: Set or update ... so that ...
    validations:
      required: true
  - type: textarea
    id: reason
    attributes:
      label: Why is this needed?
      description: Explain the impact, dependency, deadline, or user-facing reason.
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Non-secret details
      description: Include variable names, service names, chart values, compose files, expected URLs, or documentation links.
      placeholder: |
        - Variable or setting names:
        - Services affected:
        - Files affected:
        - Relevant docs:
    validations:
      required: false
  - type: textarea
    id: deadline
    attributes:
      label: Urgency or deadline
      description: When is this needed, and what breaks or blocks if it is delayed?
      placeholder: Needed by ... because ...
    validations:
      required: false
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: How should we confirm the configuration is correct after it changes?
      placeholder: |
        - Run ...
        - Check ...
        - Visit ...
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submit checks
      options:
        - label: I did not include secret values or private production data.
          required: true
        - label: I identified the target environment and affected services as clearly as I can.
          required: true
