components:
  schemas:
    ApiErrorDetails:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: object
          additionalProperties:
            type: string
    ApiErrorResponse:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/ApiErrorDetails'
      required:
      - error
    EventList:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        content:
          type: string
        event_date_start:
          type: string
          format: date-time
        event_date_end:
          type: string
          format: date-time
        members_only:
          type: boolean
        sign_up:
          type: boolean
        sign_up_avec:
          type: boolean
        sign_up_max_participants:
          type: integer
        captcha:
          type: boolean
        redirect_link:
          type: string
          nullable: true
        registration_open_members:
          type: boolean
          readOnly: true
        registration_open_others:
          type: boolean
          readOnly: true
        registration_past_due:
          type: boolean
          readOnly: true
        event_full:
          type: boolean
          readOnly: true
        sign_up_fields:
          type: array
          items:
            type: object
            additionalProperties: {}
          readOnly: true
        image_url:
          type: string
          nullable: true
          readOnly: true
      required:
      - captcha
      - content
      - event_date_end
      - event_date_start
      - event_full
      - image_url
