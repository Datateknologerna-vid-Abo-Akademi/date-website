on:
  push:
    branches:
      - develop
      - master
  workflow_dispatch:
  schedule:
    - cron: '0 0 1 * *'
jobs:
  build:
    concurrency:
      group: 'docker-publish-${{ github.ref_name }}'
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Normalize GHCR identifiers to lowercase
        shell: bash
        run: |
          echo "GHCR_REPO=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "GHCR_USER=${GITHUB_ACTOR,,}" >> "$GITHUB_ENV"
          echo "GHCR_TAG=${GITHUB_REF_NAME,,}" >> "$GITHUB_ENV"
      - name: Docker login
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
      - name: Docker build
        run: |
          docker buildx create --use
          docker buildx build --push --platform=linux/amd64,linux/arm64 -t "ghcr.io/${GHCR_REPO}:${GHCR_TAG}" .
